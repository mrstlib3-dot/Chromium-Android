name: Build

on:
  workflow_dispatch:
  
permissions:
  contents: write
  
jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 1    
    - name: Sync Chrome
      run: ./tools/sync_chromium.sh
